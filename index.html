<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#a95f67" />
  <title>ROSE Studio</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/card.css" />
  <link rel="stylesheet" href="css/setting.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <img class="hero-logo" src="assets/logo.svg" alt="ROSE Studio" />
      <div>
        <div class="brand">ROSE</div>
        <div class="tagline">Global Shopping Studio<br>by ROSE</div>
      </div>
    </header>

    <main id="app"></main>

    <nav class="bottom-tabs">
      <button data-route="dashboard" class="tab active">首頁</button>
      <button data-route="quote" class="tab">報價</button>
      <button data-route="favorites" class="tab">收藏</button>
      <button data-route="profit" class="tab">利潤</button>
      <button data-route="settings" class="tab">設定</button>
    </nav>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
