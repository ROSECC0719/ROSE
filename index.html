<!doctype html>
<!-- ROSE v3.2 Stable KR Shipping -->
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4728b" />
  <title>ROSE</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{--pink:#f4728b;--pink2:#fff1f4;--ink:#3f2d34;--muted:#8c6b75;--card:#fff;--line:#f5c7d0;--cream:#fff8ef;--green:#ecfdf3;--blue:#eff6ff;--purple:#f7f0ff;}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#fff4f7,#fffaf3);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}
    .app{max-width:540px;margin:0 auto;min-height:100vh;padding:18px 16px 96px}.top{text-align:center;padding:12px 0 18px}.logo{font-size:34px}.title{font-weight:900;font-size:28px}.sub{color:var(--muted);font-size:13px;margin-top:4px}.grid{display:grid;gap:12px}.group-title{grid-column:1/-1;font-size:18px;font-weight:950;color:#9b4054;margin:14px 2px 2px;display:flex;align-items:center;gap:8px}.group-title::after{content:"";height:1px;flex:1;background:linear-gradient(90deg,#f5c7d0,transparent)}.btn{width:100%;border:1px solid var(--line);background:#fff;border-radius:24px;padding:19px 22px;display:flex;align-items:center;justify-content:space-between;font-weight:850;font-size:21px;box-shadow:0 8px 24px #f6b8c533;cursor:pointer;color:var(--ink)}.btn small{font-size:13px;color:var(--muted);font-weight:650}.sep{height:1px;background:linear-gradient(90deg,transparent,#f5c7d0,transparent);margin:10px 0}.page{display:none}.page.active{display:block}.nav{display:flex;align-items:center;gap:12px;margin:8px 0 18px}.back{border:0;background:#fff;border-radius:50%;width:42px;height:42px;font-size:22px;box-shadow:0 8px 20px #e7b5be55;cursor:pointer}.h1{font-size:24px;font-weight:900}.panel{background:#fff;border:1px solid var(--line);border-radius:24px;padding:18px;margin-bottom:14px;box-shadow:0 8px 24px #f6b8c533}.field{margin:10px 0}.field label{display:block;font-weight:800;margin:0 0 7px;font-size:14px}.field .wrap{display:flex;align-items:center;background:#fff;border:2px solid #ffd1db;border-radius:18px;padding:0 14px}.field input{border:0;outline:0;padding:16px 4px;font-size:20px;flex:1;min-width:0;background:transparent}.unit{color:var(--muted);font-weight:800}.primary{border:0;background:var(--pink);color:white;font-size:20px;font-weight:900;border-radius:20px;width:100%;padding:17px;box-shadow:0 10px 20px #f4728b55;cursor:pointer}.settings-link{border:1px dashed var(--line);background:#fff;border-radius:18px;padding:12px;font-weight:800;color:#9b4054;cursor:pointer;width:100%;margin-top:10px}.result-grid{display:grid;gap:12px;margin-top:14px}.card{border-radius:22px;padding:16px;box-shadow:0 8px 24px #d9b8bf33}.card:nth-child(6n+1){background:#ffe6ee}.card:nth-child(6n+2){background:#fff0d8}.card:nth-child(6n+3){background:#eaf8f0}.card:nth-child(6n+4){background:#eaf2ff}.card:nth-child(6n+5){background:#f4eafe}.card:nth-child(6n+6){background:#fff6d9}.card h3{margin:0 0 12px;font-size:18px}.row{display:flex;justify-content:space-between;gap:12px;background:#ffffffcc;margin:8px 0;padding:11px 12px;border-radius:14px;font-weight:800}.row span:first-child{color:#7b5a63}.money{color:#e33f6a;font-size:19px}.kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px}.kpi .row{display:block;text-align:center}.kpi b{display:block;font-size:24px;margin-top:4px;color:#e33f6a}.pill{display:inline-flex;padding:8px 12px;border-radius:999px;background:#fff;color:#9b4054;font-weight:800;font-size:13px;margin-bottom:12px}.settings-table{display:grid;gap:10px}.setting-row{display:grid;grid-template-columns:1fr 126px;gap:10px;align-items:center}.setting-row input{border:1px solid var(--line);border-radius:12px;padding:10px;font-size:16px}.note{font-size:13px;color:var(--muted);line-height:1.5}.bottom{position:fixed;left:0;right:0;bottom:0;background:#ffffffdd;backdrop-filter:blur(12px);border-top:1px solid #f3c7d0;padding:10px 12px}.tabs{max-width:540px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.tab{border:0;background:#fff0f4;border-radius:16px;padding:10px 4px;font-weight:900;color:#9b4054;cursor:pointer}.tab.active{background:var(--pink);color:#fff}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.hidden{display:none!important}

    .top{background:linear-gradient(180deg,#fff,#fff7f5);border:1px solid #f1d4d8;border-radius:30px;padding:22px 18px 20px;margin-bottom:18px;box-shadow:0 14px 34px #d7a7aa2b}
    .logo img{filter:drop-shadow(0 8px 14px #d7a7aa55)}
    .title{letter-spacing:5px;font-family:Georgia,'Times New Roman',serif;color:#9f5960;margin-top:4px}
    .sub{font-size:12px;letter-spacing:.8px;text-transform:uppercase;color:#9a747a}
    .group-title{color:#9f5960}
    .btn{border-color:#ead1d4;background:linear-gradient(180deg,#fff,#fffaf9);border-radius:26px;padding:20px 22px;box-shadow:0 10px 26px #d7a7aa24;transition:transform .12s ease,box-shadow .12s ease}
    .btn:active{transform:scale(.985);box-shadow:0 5px 14px #d7a7aa30}
    .primary{background:#a95f67;box-shadow:0 10px 20px #a95f6740}
    .tab.active{background:#a95f67}
    .money{color:#a95f67}
    .card{box-shadow:0 10px 28px #caa0a633;border:1px solid #f0d5d9}
    .splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(180deg,#fff8f7,#fff1f4);display:flex;align-items:center;justify-content:center;animation:fadeOut .8s ease 1.05s forwards}
    .splash-inner{text-align:center;color:#9f5960;font-family:Georgia,'Times New Roman',serif;letter-spacing:6px}
    .splash-inner img{width:112px;display:block;margin:0 auto 10px;filter:drop-shadow(0 10px 16px #d7a7aa55)}
    .splash-title{font-size:28px;font-weight:800}
    .splash-sub{font-size:11px;letter-spacing:3px;margin-top:6px;color:#9a747a}
    @keyframes fadeOut{to{opacity:0;visibility:hidden}}

  .settings-group{background:#fff;border:1px solid #f0d5d9;border-radius:24px;padding:16px;margin:14px 0;box-shadow:0 10px 24px #d7a7aa22}.settings-group h3{margin:0 0 10px;color:#9f5960;font-size:18px}.quick-note{font-size:13px;color:#9a747a;line-height:1.7;margin:8px 0 12px}</style>
</head>
<body>
<div class="splash"><div class="splash-inner"><img src="icon.svg" alt="ROSE"><div class="splash-title">ROSE</div><div class="splash-sub">GLOBAL SHOPPING</div></div></div>
<div class="app">
  <section id="home" class="page active">
    <div class="top"><div class="logo"><img src="icon.svg" width="88" alt="ROSE"></div><div class="title">ROSE</div><div class="sub">Global Shopping Studio｜快速報價 v3.2</div></div>
    <div class="grid">
      <div class="group-title">🌍 亞洲代購</div>
      <button class="btn" onclick="show('jp')"><span>🇯🇵 日本</span><small>稅率 × 運費</small></button>
      <button class="btn" onclick="show('kr')"><span>🇰🇷 韓國</span><small>QU / INN</small></button>
      <button class="btn" onclick="show('th')"><span>🇹🇭 泰國</span><small>有代購費 / 無代購費</small></button>
      <button class="btn" onclick="show('hk')"><span>🇭🇰 香港</span><small>成本 / 批價</small></button>
      <div class="sep"></div>
      <div class="group-title">🌎 歐美代購</div>
      <button class="btn" onclick="show('us')"><span>🇺🇸 美國</span><small>兩種算法</small></button>
      <button class="btn" onclick="show('au')"><span>🇦🇺 澳洲</span><small>匯率 × 運費</small></button>
      <button class="btn" onclick="show('cz')"><span>🇨🇿 捷克</span><small>克朗換算</small></button>
      <div class="sep"></div>
      <button class="btn" onclick="show('settings')"><span>⚙️ 設定</span><small>匯率與運費</small></button>
    </div>
  </section>
  <section id="jp" class="page"></section><section id="kr" class="page"></section><section id="th" class="page"></section>
  <section id="us" class="page"></section><section id="hk" class="page"></section><section id="au" class="page"></section><section id="cz" class="page"></section><section id="settings" class="page"></section>
</div>
<div class="bottom"><div class="tabs">
  <button class="tab active" onclick="show('home')">首頁</button><button class="tab" onclick="show('jp')">日本</button><button class="tab" onclick="show('kr')">韓國</button><button class="tab" onclick="show('th')">泰國</button><button class="tab" onclick="show('settings')">設定</button>
</div></div>
<script>
const defaults={jpRate:.21,jpShips:[.20,.22,.24,.25,.27,.28],krQuFee:1.03,krQuRate1:39,krQuRate2:40,krQuShip1:0,krQuShip2:0,krQuAir1:.26,krQuAir2:.21,krQuSea:.16,krHongRate1:40,krHongRate2:42,krHongAir:.23,krHongSea:.146,thRate:1,thShip:.17,thWeightShip:.18,usRate:32,usFeeA:1.08,usShipA:180,usFeeB:1.07,usShipB:5,hkRateCost:3.8,hkRateWholesale:5,hkBuyerFee:0,hkBuyerFeeWholesale:30,hkShipRateCost:4.2,hkShipRateWholesale:5,hkShipPerG:.15,auRate:23,auShip:.175,czRate:1.4,czShip:.3};
let st=JSON.parse(localStorage.getItem('roseSettings')||localStorage.getItem('abbySettings')||'{}'); st={...defaults,...st};
const fmt=n=>'NT$ '+(isFinite(n)?Math.round(n).toLocaleString('zh-TW'):'0');
const fmt2=n=>'NT$ '+(isFinite(n)?Math.round(n).toLocaleString('zh-TW'):'0');
function save(){localStorage.setItem('roseSettings',JSON.stringify(st));}
function show(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); const map={home:0,jp:1,kr:2,th:3,settings:4}; if(map[id]!=null)document.querySelectorAll('.tab')[map[id]].classList.add('active'); window.scrollTo(0,0)}
function nav(title){return `<div class="nav"><button class="back" onclick="show('home')">‹</button><div class="h1">${title}</div></div>`}
function input(id,label,unit,val=0){return `<div class="field"><label>${label}</label><div class="wrap"><input id="${id}" type="number" inputmode="decimal" value="${val}" oninput="calcAll()"><span class="unit">${unit}</span></div></div>`}
function jpCost(p,w,tax,ship){return p*tax*st.jpRate+w*ship}
function renderJP(){document.getElementById('jp').innerHTML=nav('🇯🇵 日本報價')+`<div class="panel">${input('jpPrice','商品價格（日幣）','¥',100)}${input('jpWeight','重量','g',100)}<button class="primary" onclick="calcAll()">開始計算</button><button class="settings-link" onclick="show('settings')">調整日本匯率 / 運費</button></div><div id="jpResults" class="result-grid"></div>`;calcAll()}
function calcJP(){let p=+document.getElementById('jpPrice')?.value||0,w=+document.getElementById('jpWeight')?.value||0;let html=`<div class="panel kpi"><div class="row">商品<b>¥ ${p.toLocaleString()}</b></div><div class="row">重量<b>${w} g</b></div></div>`;st.jpShips.forEach(ship=>{let a=jpCost(p,w,1.1,ship),b=jpCost(p,w,1.08,ship),c=jpCost(p,w,1,ship);html+=`<div class="card"><h3>運費 ${ship.toFixed(2)}</h3><div class="row"><span>10%稅 成本</span><span class="money">${fmt(a)}</span></div><div class="row"><span>8%稅 成本</span><span class="money">${fmt(b)}</span></div><div class="row"><span>稅込 成本</span><span class="money">${fmt(c)}</span></div></div>`});document.getElementById('jpResults').innerHTML=html}
function renderKR(){document.getElementById('kr').innerHTML=nav('🇰🇷 韓國報價')+'<div class="panel"><span class="pill">QU 模式</span>'+input('krQuPrice','韓元價格','₩',1000)+input('krQuWeight','重量','g',100)+calcBtn('calcKR()')+'<span class="pill">INN 模式</span>'+input('krInnPrice','韓元價格','₩',1000)+input('krInnWeight','重量','g',100)+calcBtn('calcKR()')+'</div><div id="krResults"></div>'}
function calcKR(){let qp=+document.getElementById('krQuPrice')?.value||0,qw=+document.getElementById('krQuWeight')?.value||0,ip=+document.getElementById('krInnPrice')?.value||0,iw=+document.getElementById('krInnWeight')?.value||0;let q1=qp/st.krQuRate1+qw*st.krQuShip1,q2=qp/st.krQuRate2+qw*st.krQuShip2,i1=ip/st.krInnRate1+iw*st.krInnShip1,i2=ip/st.krInnRate2+iw*st.krInnShip2;document.getElementById('krResults').innerHTML=`<div class="card"><h3>QU</h3><div class="row"><span>匯率 ${st.krQuRate1} / 運費 ${st.krQuShip1}</span><span class="money">${fmt(q1)}</span></div><div class="row"><span>匯率 ${st.krQuRate2} / 運費 ${st.krQuShip2}</span><span class="money">${fmt(q2)}</span></div></div><div class="card"><h3>INN</h3><div class="row"><span>匯率 ${st.krInnRate1} / 運費 ${st.krInnShip1}</span><span class="money">${fmt(i1)}</span></div><div class="row"><span>匯率 ${st.krInnRate2} / 運費 ${st.krInnShip2}</span><span class="money">${fmt(i2)}</span></div></div>`}
function renderTH(){document.getElementById('th').innerHTML=nav('🇹🇭 泰國報價')+`<div class="panel"><span class="pill">有代購費</span>${input('thPrice','泰銖價格','฿',100)}${input('thWeight','重量','g',100)}<span class="pill">無代購費</span>${input('thWPrice','泰銖價格','฿',210)}${input('thWWeight','重量','g',400)}<button class="primary" onclick="calcAll()">開始計算</button></div><div id="thResults" class="result-grid"></div>`;calcAll()}
function calcTH(){let p=+document.getElementById('thPrice')?.value||0,w=+document.getElementById('thWeight')?.value||0,wp=+document.getElementById('thWPrice')?.value||0,ww=+document.getElementById('thWWeight')?.value||0;let cost=Math.round(p*1.1*st.thRate+w*st.thShip);let base=Math.round(wp*st.thRate+ww*st.thShip);let agent=Math.round(base*1.1);document.getElementById('thResults').innerHTML=`<div class="card"><h3>有代購費</h3><div class="row"><span>成本</span><span class="money">${fmt(cost)}</span></div></div><div class="card"><h3>無代購費</h3><div class="row"><span>成本</span><span class="money">${fmt(base)}</span></div><div class="row"><span>代購費10%</span><span>${fmt(agent)}</span></div></div>`}

function renderUS(){document.getElementById('us').innerHTML=nav('🇺🇸 美國報價')+`<div class="panel"><span class="pill">算法A：商品×代購×匯率 + 磅×運費</span>${input('usAUsd','美金價格','$',10.99)}${input('usALb','重量','lb',1.37)}<span class="pill">算法B：(商品×代購 + 磅×運費)×匯率</span>${input('usBUsd','美金價格','$',10.99)}${input('usBLb','重量','lb',1.37)}<span class="pill">克磅換算</span>${input('usG','克轉磅','g',500)}${input('usLb','磅轉克','lb',1)}<button class="primary" onclick="calcAll()">開始計算</button></div><div id="usResults" class="result-grid"></div>`;calcAll()}
function calcUS(){let a=+document.getElementById('usAUsd')?.value||0,alb=+document.getElementById('usALb')?.value||0,b=+document.getElementById('usBUsd')?.value||0,blb=+document.getElementById('usBLb')?.value||0,g=+document.getElementById('usG')?.value||0,lb=+document.getElementById('usLb')?.value||0;let ares=a*st.usFeeA*st.usRate+alb*st.usShipA;let bres=(b*st.usFeeB+blb*st.usShipB)*st.usRate;document.getElementById('usResults').innerHTML=`<div class="card"><h3>算法A</h3><div class="row"><span>結果</span><span class="money">${fmt2(ares)}</span></div></div><div class="card"><h3>算法B</h3><div class="row"><span>結果</span><span class="money">${fmt2(bres)}</span></div></div><div class="card"><h3>重量換算</h3><div class="row"><span>${g} g =</span><span class="money">${(g*0.0022046).toFixed(4)} lb</span></div><div class="row"><span>${lb} lb =</span><span class="money">${(lb/0.0022046).toFixed(2)} g</span></div></div>`}
function renderHK(){document.getElementById('hk').innerHTML=nav('🇭🇰 香港報價')+`<div class="panel"><span class="pill">模式1：折扣＋買手費</span>${input('hkPrice','港幣價格','HK$',125)}${input('hkDiscount','折扣','×',1)}<span class="pill">模式2：重量運費</span>${input('hkWPrice','港幣價格','HK$',20)}${input('hkWeightFee','重量運費','NT$',85)}${input('hkWDiscount','折扣','×',1)}<button class="primary" onclick="calcAll()">開始計算</button></div><div id="hkResults" class="result-grid"></div>`;calcAll()}
function calcHK(){let p=+document.getElementById('hkPrice')?.value||0,d=+document.getElementById('hkDiscount')?.value||0,wp=+document.getElementById('hkWPrice')?.value||0,wf=+document.getElementById('hkWeightFee')?.value||0,wd=+document.getElementById('hkWDiscount')?.value||0;let c=p*d*st.hkRateCost+st.hkBuyerFee,wh=p*d*st.hkRateWholesale+st.hkBuyerFeeWholesale;let c2=wp*wd*st.hkShipRateCost+wf*st.hkShipPerG,wh2=wp*wd*st.hkShipRateWholesale+wf*st.hkShipPerG;document.getElementById('hkResults').innerHTML=`<div class="card"><h3>模式1：折扣＋買手費</h3><div class="row"><span>成本</span><span class="money">${fmt2(c)}</span></div><div class="row"><span>批價</span><span>${fmt2(wh)}</span></div></div><div class="card"><h3>模式2：重量運費</h3><div class="row"><span>成本</span><span class="money">${fmt2(c2)}</span></div><div class="row"><span>批價</span><span>${fmt2(wh2)}</span></div></div>`}
function renderAU(){document.getElementById('au').innerHTML=nav('🇦🇺 澳洲報價')+`<div class="panel">${input('auPrice','澳幣價格','A$',30)}${input('auWeight','重量','g',150)}<button class="primary" onclick="calcAll()">開始計算</button></div><div id="auResults" class="result-grid"></div>`;calcAll()}
function calcAU(){let p=+document.getElementById('auPrice')?.value||0,w=+document.getElementById('auWeight')?.value||0;let res=p*st.auRate+w*st.auShip;document.getElementById('auResults').innerHTML=`<div class="card"><h3>澳洲小計</h3><div class="row"><span>結果</span><span class="money">${fmt2(res)}</span></div></div>`}
function renderCZ(){document.getElementById('cz').innerHTML=nav('🇨🇿 捷克報價')+`<div class="panel">${input('czPrice','克朗價格','Kč',119.9)}${input('czWeight','重量','g',150)}<button class="primary" onclick="calcAll()">開始計算</button></div><div id="czResults" class="result-grid"></div>`;calcAll()}
function calcCZ(){let p=+document.getElementById('czPrice')?.value||0,w=+document.getElementById('czWeight')?.value||0;let res=p*st.czRate+w*st.czShip;document.getElementById('czResults').innerHTML=`<div class="card"><h3>捷克小計</h3><div class="row"><span>結果</span><span class="money">${fmt2(res)}</span></div></div>`}
function renderSettings(){let fields=[
['🇯🇵 日本','jpRate','日幣匯率'],
['🇰🇷 韓國','krQuRate1','韓國QU匯率1'],
['🇰🇷 韓國','krQuRate2','韓國QU匯率2'],
['🇰🇷 韓國','krQuShip1','韓國QU運費1 / 每g'],
['🇰🇷 韓國','krQuShip2','韓國QU運費2 / 每g'],
['🇰🇷 韓國','krInnRate1','韓國INN匯率1'],
['🇰🇷 韓國','krInnRate2','韓國INN匯率2'],
['🇰🇷 韓國','krInnShip1','韓國INN運費1 / 每g'],
['🇰🇷 韓國','krInnShip2','韓國INN運費2 / 每g'],
['🇹🇭 泰國','thRate','泰銖匯率'],
['🇺🇸 美國','usRate','美金匯率'],
['🇭🇰 香港','hkCost','港幣成本匯率'],
['🇭🇰 香港','hkRate','港幣批價匯率'],
['🇭🇰 香港','hkWeightCost','香港重量成本匯率'],
['🇭🇰 香港','hkWeightRate','香港重量批價匯率'],
['🇦🇺 澳洲','auRate','澳幣匯率'],
['🇦🇺 澳洲','auWeight','澳洲運費'],
['🇨🇿 捷克','czRate','捷克匯率'],
['🇨🇿 捷克','czShip','捷克運費']
];let html=nav('⚙️ 設定')+'<div class="panel">';let current='';fields.forEach(([group,k,label])=>{if(group!==current){if(current)html+='</div>';current=group;html+=`<div class="settings-group"><h3>${group}</h3>`}html+=`<div class="row"><span>${label}</span><input id="set_${k}" type="number" step="0.01" value="${st[k]??defaults[k]??0}"></div>`});html+='</div><p class="quick-note">韓國運費請填每 g 運費；不收運費就填 0。</p><button class="primary" onclick="saveSettings()">儲存設定</button></div>';document.getElementById('settings').innerHTML=html}
function saveSettings(){Object.keys(defaults).forEach(k=>{let el=document.getElementById('set_'+k);if(el){st[k]=+el.value}});localStorage.setItem('roseSettings',JSON.stringify(st));alert('設定已儲存');renderAll()}
function renderAll(){renderJP();renderKR();renderTH();renderUS();renderHK();renderAU();renderCZ();renderSettings()}
renderAll();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
</script>
</body>
</html>
