<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ff8a3d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Abby代購神器">
  <title>Abby代購神器</title>
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root{--bg:#fff8f1;--card:#fff;--ink:#2c211a;--muted:#7a6658;--brand:#ff8a3d;--brand2:#ffb26f;--line:#ead8c8;--good:#138a52;--shadow:0 12px 28px rgba(82,45,16,.12)}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",sans-serif;background:linear-gradient(180deg,#fff4e8,#fffaf5);color:var(--ink)}
    .app{max-width:560px;margin:0 auto;min-height:100svh;padding:18px 14px 96px}.top{position:sticky;top:0;z-index:5;margin:-18px -14px 12px;padding:16px 14px 10px;background:rgba(255,248,241,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(234,216,200,.8)}
    h1{margin:0;font-size:24px;letter-spacing:.5px}.sub{color:var(--muted);font-size:13px;margin-top:4px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.tab{border:1px solid var(--line);background:#fff;border-radius:18px;padding:10px 8px;font-weight:800;color:var(--ink)}.tab.active{background:var(--brand);color:white;border-color:var(--brand);box-shadow:0 8px 18px rgba(255,138,61,.28)}
    .section{display:none}.section.active{display:block}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:16px;margin:12px 0;box-shadow:var(--shadow)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.full{grid-column:1/-1}label{display:block;font-size:13px;color:var(--muted);font-weight:700;margin-bottom:6px}input,select{width:100%;border:1px solid var(--line);border-radius:16px;padding:13px 12px;font-size:18px;background:#fff;color:var(--ink);outline:none}input:focus,select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(255,138,61,.16)}
    .btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.btn{border:0;border-radius:18px;padding:13px;font-size:16px;font-weight:900;background:var(--brand);color:#fff}.btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}.result{display:grid;gap:8px}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fffaf6;border:1px dashed #e7c9ae;border-radius:18px;padding:12px}.row b{font-size:14px}.money{font-size:23px;font-weight:950;color:var(--good)}.small{font-size:12px;color:var(--muted);line-height:1.6}.pill{display:inline-flex;padding:4px 9px;border-radius:999px;background:#fff0e3;color:#a65015;font-weight:800;font-size:12px;margin-left:4px}.mode{display:flex;gap:8px;margin:10px 0}.mode button{flex:1;border-radius:16px;border:1px solid var(--line);background:white;padding:10px;font-weight:900}.mode button.active{background:#2c211a;color:white}.hide{display:none}.footerNav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:9px 10px calc(9px + env(safe-area-inset-bottom));display:flex;justify-content:center;gap:8px}.footerNav button{width:31%;max-width:170px;border:0;border-radius:16px;padding:10px 4px;background:#fff3e8;color:#603715;font-weight:900}.footerNav button.active{background:var(--brand);color:white}.quote{font-size:13px;color:var(--muted);margin-top:8px}.settingsTitle{font-size:17px;font-weight:950;margin:10px 0 4px}.danger{color:#b94b21;font-weight:800}.quickBtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.quickBtns button{border:1px solid var(--line);background:white;border-radius:999px;padding:8px 10px;font-weight:800}.notice{background:#2c211a;color:white;border-radius:20px;padding:14px;margin:12px 0;font-size:13px;line-height:1.6}.notice b{color:#ffd9b9}@media (max-width:380px){.grid,.grid3{grid-template-columns:1fr}.money{font-size:20px}}
  </style>
</head>
<body>
<div class="app">
  <div class="top"><h1>📦 Abby代購神器</h1><div class="sub">日本、韓國、泰國主力｜其他國家輔助｜設定會自動儲存在手機</div><div class="tabs" id="mainTabs"><button class="tab active" data-tab="jp">🇯🇵 日本</button><button class="tab" data-tab="kr">🇰🇷 韓國</button><button class="tab" data-tab="th">🇹🇭 泰國</button></div></div>

  <section id="jp" class="section active"><div class="mode"><button class="active" data-mode="jp" data-value="quick">極速報價</button><button data-mode="jp" data-value="full">完整管理</button></div><div class="card"><div class="grid"><div><label>商品價格（日幣）</label><input id="jpPrice" inputmode="decimal" placeholder="例 3980"></div><div><label>重量（g，可空白）</label><input id="jpWeight" inputmode="decimal" placeholder="例 120"></div><div class="full fullOnly jpFull"><label>選擇運費級距</label><select id="jpFreight"><option value="0.25">0.25 常用</option><option value="0.27">0.27 常用</option><option value="0.28">0.28 常用</option><option value="0.20">0.20 隱藏級距</option><option value="0.21">0.21 隱藏級距</option><option value="0.22">0.22 隱藏級距</option><option value="0.23">0.23 隱藏級距</option><option value="0.24">0.24 隱藏級距</option><option value="0.26">0.26 隱藏級距</option><option value="0.29">0.29 隱藏級距</option><option value="0.30">0.30 隱藏級距</option></select></div></div><div class="btns"><button class="btn" onclick="calcAll()">立即計算</button><button class="btn secondary" onclick="clearInputs('jp')">清除</button></div></div><div class="card result" id="jpResult"></div></section>

  <section id="kr" class="section"><div class="mode"><button class="active" data-mode="kr" data-value="quick">極速報價</button><button data-mode="kr" data-value="full">完整管理</button></div><div class="card"><div class="grid"><div><label>商品價格（韓元）</label><input id="krPrice" inputmode="decimal" placeholder="例 28000"></div><div><label>重量（g）</label><input id="krWeight" inputmode="decimal" placeholder="例 900"></div></div><div class="btns"><button class="btn" onclick="calcAll()">立即計算</button><button class="btn secondary" onclick="clearInputs('kr')">清除</button></div></div><div class="card result" id="krResult"></div></section>

  <section id="th" class="section"><div class="mode"><button class="active" data-mode="th" data-value="quick">極速報價</button><button data-mode="th" data-value="full">完整管理</button></div><div class="card"><div class="grid"><div><label>商品價格（泰銖）</label><input id="thPrice" inputmode="decimal" placeholder="例 390"></div><div><label>重量（g）</label><input id="thWeight" inputmode="decimal" placeholder="例 200"></div></div><div class="btns"><button class="btn" onclick="calcAll()">立即計算</button><button class="btn secondary" onclick="clearInputs('th')">清除</button></div></div><div class="card result" id="thResult"></div></section>

  <section id="more" class="section"><div class="card"><div class="settingsTitle">輔助國家</div><div class="grid"><button class="btn secondary" onclick="showAux('us')">🇺🇸 美國</button><button class="btn secondary" onclick="showAux('hk')">🇭🇰 香港</button><button class="btn secondary" onclick="showAux('au')">🇦🇺 澳洲</button><button class="btn secondary" onclick="showAux('cz')">🇨🇿 捷克</button></div></div><div class="card" id="auxBox"><div class="small">選一個國家開始試算。</div></div></section>

  <section id="settings" class="section"><div class="notice">⚙️ <b>完整管理版</b>：匯率、運費、利潤都能改。改完按「儲存設定」，下次打開會保留。</div><div class="card"><div class="settingsTitle">匯率 / 基本參數</div><div class="grid" id="settingsGrid"></div><div class="btns"><button class="btn" onclick="saveSettings();calcAll();">儲存設定</button><button class="btn secondary" onclick="resetSettings()">還原預設</button></div><div class="quote">小提醒：這是 V1 可部署版，公式已先依妳原試算表邏輯整理，正式使用前建議拿 3-5 筆舊報價交叉驗算。</div></div></section>
</div>
<div class="footerNav"><button class="active" data-bottom="main">主力</button><button data-bottom="more">輔助</button><button data-bottom="settings">設定</button></div>
<script>
const defaults={jpRate:.21,jpTax:1.1,jpWholesale:1.1,jpRetail:1.5,krRate:39,krFee:1.03,krAir:.26,krSea:.16,krWholesale:1.1,krRetail:1.5,thRate:.92,thFee:1.1,thFreight:.17,thWholesale:1.2,thRetail:1.5,usRate:32,usFee:1.1,usFreight:12,hkRate:4.1,hkDiscount:1,hkBuyerFee:0,auRate:21,auFreight:.2,czRate:1.45,czFreight:.2};
let cfg={...defaults,...JSON.parse(localStorage.getItem('abbyCfg')||'{}')}; let modes={jp:'quick',kr:'quick',th:'quick'};
function n(id){return parseFloat(document.getElementById(id)?.value)||0} function fmt(x){if(!isFinite(x))return 'NT$0'; return 'NT$'+Math.round(x).toLocaleString('zh-TW')} function row(name,val,note=''){return `<div class="row"><div><b>${name}</b>${note?`<div class="small">${note}</div>`:''}</div><div class="money">${fmt(val)}</div></div>`}
function calcAll(){calcJP();calcKR();calcTH()}
function calcJP(){let p=n('jpPrice'),w=n('jpWeight'),freight=parseFloat(document.getElementById('jpFreight').value);let common=[.25,.27,.28];let html=''; if(!p){document.getElementById('jpResult').innerHTML='<div class="small">輸入日幣價格後會自動顯示成本、批價、售價。</div>';return} if(modes.jp==='quick'){common.forEach(f=>{let cost=p*cfg.jpTax*cfg.jpRate+w*f;html+=row(`成本｜運費 ${f}`,cost)});let base=p*cfg.jpTax*cfg.jpRate+w*.27;html+=row('建議批價',base*cfg.jpWholesale,'以 0.27 運費估算');html+=row('建議售價',base*cfg.jpRetail,'以 0.27 運費估算')}else{let cost=p*cfg.jpTax*cfg.jpRate+w*freight;html+=row('精算成本',cost,`匯率 ${cfg.jpRate}｜消費稅 ${cfg.jpTax}｜運費 ${freight}`);html+=row('批價',cost*cfg.jpWholesale);html+=row('售價',cost*cfg.jpRetail)}document.getElementById('jpResult').innerHTML=html}
function calcKR(){let p=n('krPrice'),w=n('krWeight'); if(!p){document.getElementById('krResult').innerHTML='<div class="small">輸入韓元與重量後，會同時比較空運與海運。</div>';return}let product=p*cfg.krFee/cfg.krRate;let air=product+w*cfg.krAir,sea=product+w*cfg.krSea;let html=row('✈️ 空運成本',air,`代購費 ${cfg.krFee}｜匯率除 ${cfg.krRate}`)+row('🚢 海運成本',sea,`代購費 ${cfg.krFee}｜匯率除 ${cfg.krRate}`);if(modes.kr==='full'){html+=row('空運批價',air*cfg.krWholesale)+row('空運售價',air*cfg.krRetail)+row('海運批價',sea*cfg.krWholesale)+row('海運售價',sea*cfg.krRetail)}document.getElementById('krResult').innerHTML=html}
function calcTH(){let p=n('thPrice'),w=n('thWeight'); if(!p){document.getElementById('thResult').innerHTML='<div class="small">輸入泰銖與重量後，會計算成本、批價、售價。</div>';return}let cost=p*cfg.thFee*cfg.thRate+w*cfg.thFreight;let html=row('成本',cost,`代購費 ${cfg.thFee}｜匯率 ${cfg.thRate}`)+row('批價',cost*cfg.thWholesale)+row('售價',cost*cfg.thRetail);document.getElementById('thResult').innerHTML=html}
function clearInputs(prefix){['Price','Weight'].forEach(k=>{let el=document.getElementById(prefix+k); if(el)el.value=''});calcAll()}
function showAux(type){let labels={us:'🇺🇸 美國',hk:'🇭🇰 香港',au:'🇦🇺 澳洲',cz:'🇨🇿 捷克'};let html=`<div class="settingsTitle">${labels[type]}</div><div class="grid"><div><label>商品金額</label><input id="auxPrice" inputmode="decimal"></div><div><label>重量 / 磅數</label><input id="auxWeight" inputmode="decimal"></div></div><div class="btns"><button class="btn" onclick="calcAux('${type}')">計算</button><button class="btn secondary" onclick="document.getElementById('auxPrice').value='';document.getElementById('auxWeight').value='';document.getElementById('auxOut').innerHTML=''">清除</button></div><div class="result" id="auxOut" style="margin-top:12px"></div>`;document.getElementById('auxBox').innerHTML=html}
function calcAux(t){let p=n('auxPrice'),w=n('auxWeight'),cost=0,note=''; if(t==='us'){cost=(p*cfg.usFee+w*cfg.usFreight)*cfg.usRate;note=`美金匯率 ${cfg.usRate}｜倍率 ${cfg.usFee}｜運費/磅 ${cfg.usFreight}`} if(t==='hk'){cost=p*cfg.hkDiscount*cfg.hkRate+cfg.hkBuyerFee;note=`港幣匯率 ${cfg.hkRate}｜折扣 ${cfg.hkDiscount}｜買手費 ${cfg.hkBuyerFee}`} if(t==='au'){cost=p*cfg.auRate+w*cfg.auFreight;note=`澳幣匯率 ${cfg.auRate}｜重量運費 ${cfg.auFreight}`} if(t==='cz'){cost=p*cfg.czRate+w*cfg.czFreight;note=`捷克匯率 ${cfg.czRate}｜重量運費 ${cfg.czFreight}`} document.getElementById('auxOut').innerHTML=row('成本',cost,note)+row('建議售價',cost*1.5)}
function buildSettings(){let names={jpRate:'日幣匯率',jpTax:'日本消費稅',jpWholesale:'日本批價倍率',jpRetail:'日本售價倍率',krRate:'韓元除數',krFee:'韓國代購費',krAir:'韓國空運/g',krSea:'韓國海運/g',thRate:'泰銖匯率',thFee:'泰國代購費',thFreight:'泰國運費/g',thWholesale:'泰國批價倍率',thRetail:'泰國售價倍率',usRate:'美金匯率',hkRate:'港幣匯率',auRate:'澳幣匯率',czRate:'捷克匯率'};let html='';Object.keys(names).forEach(k=>html+=`<div><label>${names[k]}</label><input id="set_${k}" inputmode="decimal" value="${cfg[k]}"></div>`);document.getElementById('settingsGrid').innerHTML=html}
function saveSettings(){Object.keys(defaults).forEach(k=>{let el=document.getElementById('set_'+k); if(el) cfg[k]=parseFloat(el.value)||0});localStorage.setItem('abbyCfg',JSON.stringify(cfg));alert('設定已儲存 ✅')}
function resetSettings(){if(confirm('確定還原預設設定？')){cfg={...defaults};localStorage.setItem('abbyCfg',JSON.stringify(cfg));buildSettings();calcAll()}}
document.querySelectorAll('#mainTabs .tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('#mainTabs .tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById(b.dataset.tab).classList.add('active');document.querySelectorAll('.footerNav button').forEach(x=>x.classList.remove('active'));document.querySelector('[data-bottom="main"]').classList.add('active')});
document.querySelectorAll('.footerNav button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.footerNav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');let target=b.dataset.bottom;document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); if(target==='main'){document.getElementById(document.querySelector('#mainTabs .active').dataset.tab).classList.add('active')}else{document.getElementById(target).classList.add('active')}});
document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{let m=b.dataset.mode;modes[m]=b.dataset.value;b.parentElement.querySelectorAll('button').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.querySelectorAll('.'+m+'Full').forEach(x=>x.classList.toggle('hide',modes[m]!=='full'));calcAll()});
document.querySelectorAll('input,select').forEach(el=>el.addEventListener('input',calcAll));buildSettings();calcAll(); if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body>
</html>
