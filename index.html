  <style>
    :root{--pink:#f4728b;--pink2:#fff1f4;--ink:#3f2d34;--muted:#8c6b75;--card:#fff;--line:#f5c7d0;--cream:#fff8ef;--green:#ecfdf3;--blue:#eff6ff;--purple:#f7f0ff;}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#fff4f7,#fffaf3);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}
    .app{max-width:540px;margin:0 auto;min-height:100vh;padding:18px 16px 96px}.top{text-align:center;padding:12px 0 18px}.logo{font-size:34px}.title{font-weight:900;font-size:28px}.sub{color:var(--muted);font-size:13px;margin-top:4px}.grid{display:grid;gap:12px}.group-title{grid-column:1/-1;font-size:18px;font-weight:950;color:#9b4054;margin:14px 2px 2px;display:flex;align-items:center;gap:8px}.group-title::after{content:"";height:1px;flex:1;background:linear-gradient(90deg,#f5c7d0,transparent)}.btn{width:100%;border:1px solid var(--line);background:#fff;border-radius:24px;padding:19px 22px;display:flex;align-items:center;justify-content:space-between;font-weight:850;font-size:21px;box-shadow:0 8px 24px #f6b8c533;cursor:pointer;color:var(--ink)}.btn small{font-size:13px;color:var(--muted);font-weight:650}.sep{height:1px;background:linear-gradient(90deg,transparent,#f5c7d0,transparent);margin:10px 0}.page{display:none}.page.active{display:block}.nav{display:flex;align-items:center;gap:12px;margin:8px 0 18px}.back{border:0;background:#fff;border-radius:50%;width:42px;height:42px;font-size:22px;box-shadow:0 8px 20px #e7b5be55;cursor:pointer}.h1{font-size:24px;font-weight:900}.panel{background:#fff;border:1px solid var(--line);border-radius:24px;padding:18px;margin-bottom:14px;box-shadow:0 8px 24px #f6b8c533}.field{margin:10px 0}.field label{display:block;font-weight:800;margin:0 0 7px;font-size:14px}.field .wrap{display:flex;align-items:center;background:#fff;border:2px solid #ffd1db;border-radius:18px;padding:0 14px}.field input{border:0;outline:0;padding:16px 4px;font-size:20px;flex:1;min-width:0;background:transparent}.unit{color:var(--muted);font-weight:800}.primary{border:0;background:var(--pink);color:white;font-size:20px;font-weight:900;border-radius:20px;width:100%;padding:17px;box-shadow:0 10px 20px #f4728b55;cursor:pointer}.settings-link{border:1px dashed var(--line);background:#fff;border-radius:18px;padding:12px;font-weight:800;color:#9b4054;cursor:pointer;width:100%;margin-top:10px}.result-grid{display:grid;gap:12px;margin-top:14px}.card{border-radius:22px;padding:16px;box-shadow:0 8px 24px #d9b8bf33}.card:nth-child(6n+1){background:#ffe6ee}.card:nth-child(6n+2){background:#fff0d8}.card:nth-child(6n+3){background:#eaf8f0}.card:nth-child(6n+4){background:#eaf2ff}.card:nth-child(6n+5){background:#f4eafe}.card:nth-child(6n+6){background:#fff6d9}.card h3{margin:0 0 12px;font-size:18px}.row{display:flex;justify-content:space-between;gap:12px;background:#ffffffcc;margin:8px 0;padding:11px 12px;border-radius:14px;font-weight:800}.row span:first-child{color:#7b5a63}.money{color:#e33f6a;font-size:19px}.kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px}.kpi .row{display:block;text-align:center}.kpi b{display:block;font-size:24px;margin-top:4px;color:#e33f6a}.pill{display:inline-flex;padding:8px 12px;border-radius:999px;background:#fff;color:#9b4054;font-weight:800;font-size:13px;margin-bottom:12px}.settings-table{display:grid;gap:10px}.setting-row{display:grid;grid-template-columns:1fr 126px;gap:10px;align-items:center}.setting-row input{border:1px solid var(--line);border-radius:12px;padding:10px;font-size:16px}.note{font-size:13px;color:var(--muted);line-height:1.5}.bottom{position:fixed;left:0;right:0;bottom:0;background:#ffffffdd;backdrop-filter:blur(12px);border-top:1px solid #f3c7d0;padding:10px 12px}.tabs{max-width:540px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.tab{border:0;background:#fff0f4;border-radius:16px;padding:10px 4px;font-weight:900;color:#9b4054;cursor:pointer}.tab.active{background:var(--pink);color:#fff}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.hidden{display:none!important}.setting-title{font-weight:950;color:#9b4054;margin:18px 0 6px;font-size:17px}.setting-hint{font-size:13px;color:var(--muted);line-height:1.55;background:#fff7f9;border:1px dashed var(--line);border-radius:16px;padding:10px 12px;margin:0 0 12px}
  
/* ROSE v4.2 visual polish */
:root{
  --pink:#a95f67;
  --pink2:#fff2f4;
  --ink:#34252a;
  --muted:#8f6d73;
  --line:#ecd2d6;
}
body{
  background:
    radial-gradient(circle at top left,#fff 0,#fff7f4 34%,transparent 58%),
    linear-gradient(180deg,#fff5f6,#fffaf3);
}
.app{padding-top:16px}
.top{
  background:linear-gradient(180deg,#fff,#fff8f6);
  border:1px solid #efd2d6;
  border-radius:32px;
  padding:24px 18px 20px;
  margin-bottom:18px;
  box-shadow:0 18px 42px #c58b9330;
}
.logo img{
  width:86px;
  filter:drop-shadow(0 10px 16px #b76b7342);
}
.title{
  font-family:Georgia,'Times New Roman',serif;
  letter-spacing:7px;
  color:#9f5960;
  font-size:30px;
  margin-top:4px;
}
.sub{
  color:#9a747a;
  letter-spacing:.8px;
  font-size:12px;
  text-transform:uppercase;
}
.group-title{
  color:#9f5960;
  font-size:17px;
  margin-top:16px;
}
.group-title::after{
  background:linear-gradient(90deg,#ead0d4,transparent);
}
.btn{
  background:linear-gradient(180deg,#ffffff,#fffaf8);
  border-color:#ecd2d6;
  border-radius:28px;
  padding:20px 22px;
  box-shadow:0 12px 28px #c58b9326;
  transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease;
}
.btn:active{
  transform:scale(.985);
  box-shadow:0 6px 16px #c58b9330;
}
.btn span{letter-spacing:.2px}
.btn small{color:#98757b}
.panel{
  border-color:#ecd2d6;
  border-radius:28px;
  box-shadow:0 14px 34px #c58b9326;
}
.field .wrap{
  border-color:#efd0d6;
  border-radius:20px;
}
.primary{
  background:#a95f67;
  box-shadow:0 12px 24px #a95f6742;
}
.settings-link{
  color:#9f5960;
  border-color:#e7c3ca;
}
.card{
  border:1px solid #efd6d9;
  border-radius:26px;
  box-shadow:0 14px 32px #c58b9324;
}
.card h3{
  color:#8f4f57;
  letter-spacing:.4px;
}
.row{
  border-radius:16px;
}
.money{
  color:#a95f67;
}
.pill{
  background:#fff4f5;
  color:#9f5960;
}
.back{
  box-shadow:0 10px 22px #c58b9330;
}
.bottom{
  border-top-color:#efd2d6;
}
.tab{
  background:#fff3f5;
  color:#9f5960;
}
.tab.active{
  background:#a95f67;
  color:#fff;
}
.setting-title{
  color:#9f5960;
}
.setting-hint{
  background:#fff7f8;
  border-color:#ecd2d6;
}

</style>
</head>
<body><div id="netStatus" style="position:fixed;top:10px;right:10px;background:#fff;padding:6px 10px;border-radius:20px;box-shadow:0 1px 4px #999;z-index:9999;font:14px sans-serif">🟢 Online</div>
<div class="app">
  <section id="home" class="page active">
    <div class="top"><div class="logo"><img src="icon.svg" width="82" alt="ROSE"></div><div class="title">ROSE</div><div class="sub">亞洲代購・歐美代購｜快速報價 v4.2 Offline</div></div>
    <div class="grid">
      <div class="group-title">🌍 亞洲代購</div>
      <button class="btn" onclick="show('jp')"><span>🇯🇵 日本</span><small>稅率 × 運費</small></button>
      <button class="btn" onclick="show('kr')"><span>🇰🇷 韓國</span><small>QU / INN</small></button>
      <button class="btn" onclick="show('th')"><span>🇹🇭 泰國</span><small>有代購費 / 無代購費</small></button>
      <button class="btn" onclick="show('hk')"><span>🇭🇰 香港</span><small>成本 / 批價</small></button>
      <div class="sep"></div>
      <div class="group-title">🌎 歐美代購</div>
      <button class="btn" onclick="show('us')"><span>🇺🇸 美國</span><small>兩種算法</small></button>
      <button class="btn" onclick="show('au')"><span>🇦🇺 澳洲</span><small>匯率 × 運費</small></button>
      <button class="btn" onclick="show('cz')"><span>🇨🇿 捷克</span><small>克朗換算</small></button>
      <div class="sep"></div>
      <button class="btn" onclick="show('settings')"><span>⚙️ 設定</span><small>匯率與運費</small></button>
    </div>
  </section>
  <section id="jp" class="page"></section><section id="kr" class="page"></section><section id="th" class="page"></section>
  <section id="us" class="page"></section><section id="hk" class="page"></section><section id="au" class="page"></section><section id="cz" class="page"></section><section id="settings" class="page"></section>
</div>
<div class="bottom"><div class="tabs">
  <button class="tab active" onclick="show('home')">首頁</button><button class="tab" onclick="show('jp')">日本</button><button class="tab" onclick="show('kr')">韓國</button><button class="tab" onclick="show('th')">泰國</button><button class="tab" onclick="show('settings')">設定</button>
</div></div>
<script>
const defaults={jpRate:.21,jpShips:[.20,.22,.24,.25,.27,.28],krQuFee:1.03,krQuRate1:39,krQuRate2:40,krQuAir1:.26,krQuAir2:.21,krQuSea:.16,krHongRate1:40,krHongRate2:42,krHongAir:.23,krHongSea:.146,thRate:1,thShip:.17,thWeightShip:.18,usRate:32,usFeeA:1.08,usShipA:180,usFeeB:1.07,usShipB:5,hkRateCost:3.8,hkRateWholesale:5,hkBuyerFee:0,hkBuyerFeeWholesale:30,hkShipRateCost:4.2,hkShipRateWholesale:5,hkShipPerG:.15,auRate:23,auShip:.175,czRate:1.4,czShip:.3};
let st=JSON.parse(localStorage.getItem('roseSettings')||localStorage.getItem('abbySettings')||'{}'); st={...defaults,...st};
const fmt=n=>'NT$ '+(isFinite(n)?Math.round(n).toLocaleString('zh-TW'):'0');
const fmt2=n=>'NT$ '+(isFinite(n)?Math.round(n).toLocaleString('zh-TW'):'0');
function save(){localStorage.setItem('roseSettings',JSON.stringify(st));}
function show(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); const map={home:0,jp:1,kr:2,th:3,settings:4}; if(map[id]!=null)document.querySelectorAll('.tab')[map[id]].classList.add('active'); window.scrollTo(0,0)}
function nav(title){return `<div class="nav"><button class="back" onclick="show('home')">‹</button><div class="h1">${title}</div></div>`}
function input(id,label,unit,val=0){return `<div class="field"><label>${label}</label><div class="wrap"><input id="${id}" type="number" inputmode="decimal" value="${val}" oninput="calcAll()"><span class="unit">${unit}</span></div></div>`}
function jpCost(p,w,tax,ship){return p*tax*st.jpRate+w*ship}
function renderJP(){document.getElementById('jp').innerHTML=nav('🇯🇵 日本報價')+`<div class="panel">${input('jpPrice','商品價格（日幣）','¥',100)}${input('jpWeight','重量','g',100)}<button class="primary" onclick="calcAll()">開始計算</button><button class="settings-link" onclick="show('settings')">調整日本匯率 / 運費</button></div><div id="jpResults" class="result-grid"></div>`;calcAll()}
function calcJP(){let p=+document.getElementById('jpPrice')?.value||0,w=+document.getElementById('jpWeight')?.value||0;let html=`<div class="panel kpi"><div class="row">商品<b>¥ ${p.toLocaleString()}</b></div><div class="row">重量<b>${w} g</b></div></div>`;st.jpShips.forEach(ship=>{let a=jpCost(p,w,1.1,ship),b=jpCost(p,w,1.08,ship),c=jpCost(p,w,1,ship);html+=`<div class="card"><h3>運費 ${ship.toFixed(2)}</h3><div class="row"><span>10%稅 成本</span><span class="money">${fmt(a)}</span></div><div class="row"><span>8%稅 成本</span><span class="money">${fmt(b)}</span></div><div class="row"><span>稅込 成本</span><span class="money">${fmt(c)}</span></div></div>`});document.getElementById('jpResults').innerHTML=html}
function renderKR(){document.getElementById('kr').innerHTML=nav('🇰🇷 韓國報價')+`<div class="panel"><span class="pill">QU 模式</span>${input('krQuPrice','韓元價格','₩',28000)}${input('krQuWeight','重量','g',900)}<span class="pill">INN 模式</span>${input('krHongPrice','韓元價格','₩',10000)}${input('krHongWeight','重量','g',200)}<button class="primary" onclick="calcAll()">開始計算</button></div><div id="krResults" class="result-grid"></div>`;calcAll()}
function calcKR(){let p=+document.getElementById('krQuPrice')?.value||0,w=+document.getElementById('krQuWeight')?.value||0,hp=+document.getElementById('krHongPrice')?.value||0,hw=+document.getElementById('krHongWeight')?.value||0;let qAir1=p*st.krQuFee/st.krQuRate1+w*st.krQuAir1,qAir2=p*st.krQuFee/st.krQuRate2+w*st.krQuAir2,qSea1=p*st.krQuFee/st.krQuRate1+w*st.krQuSea,qSea2=p*st.krQuFee/st.krQuRate2+w*st.krQuSea;let hAir1=hp/st.krHongRate1+hw*st.krHongAir,hAir2=hp/st.krHongRate2+hw*st.krHongAir,hSea1=hp/st.krHongRate1+hw*st.krHongSea,hSea2=hp/st.krHongRate2+hw*st.krHongSea;document.getElementById('krResults').innerHTML=`<div class="card"><h3>QU 空運</h3><div class="row"><span>匯率 ${st.krQuRate1}｜運費 ${st.krQuAir1}/g</span><span class="money">${fmt(qAir1)}</span></div><div class="row"><span>匯率 ${st.krQuRate2}｜運費 ${st.krQuAir2}/g</span><span class="money">${fmt(qAir2)}</span></div></div><div class="card"><h3>QU 海運</h3><div class="row"><span>匯率 ${st.krQuRate1}｜運費 ${st.krQuSea}/g</span><span class="money">${fmt(qSea1)}</span></div><div class="row"><span>匯率 ${st.krQuRate2}｜運費 ${st.krQuSea}/g</span><span class="money">${fmt(qSea2)}</span></div></div><div class="card"><h3>INN 空運</h3><div class="row"><span>匯率 ${st.krHongRate1}｜運費 ${st.krHongAir}/g</span><span class="money">${fmt(hAir1)}</span></div><div class="row"><span>匯率 ${st.krHongRate2}｜運費 ${st.krHongAir}/g</span><span class="money">${fmt(hAir2)}</span></div></div><div class="card"><h3>INN 海運</h3><div class="row"><span>匯率 ${st.krHongRate1}｜運費 ${st.krHongSea}/g</span><span class="money">${fmt(hSea1)}</span></div><div class="row"><span>匯率 ${st.krHongRate2}｜運費 ${st.krHongSea}/g</span><span class="money">${fmt(hSea2)}</span></div></div>`}
function renderTH(){document.getElementById('th').innerHTML=nav('🇹🇭 泰國報價')+`<div class="panel"><span class="pill">有代購費</span>${input('thPrice','泰銖價格','฿',100)}${input('thWeight','重量','g',100)}<span class="pill">無代購費</span>${input('thWPrice','泰銖價格','฿',210)}${input('thWWeight','重量','g',400)}<button class="primary" onclick="calcAll()">開始計算</button></div><div id="thResults" class="result-grid"></div>`;calcAll()}
function calcTH(){let p=+document.getElementById('thPrice')?.value||0,w=+document.getElementById('thWeight')?.value||0,wp=+document.getElementById('thWPrice')?.value||0,ww=+document.getElementById('thWWeight')?.value||0;let cost=Math.round(p*1.1*st.thRate+w*st.thShip);let base=Math.round(wp*st.thRate+ww*st.thShip);let agent=Math.round(base*1.1);document.getElementById('thResults').innerHTML=`<div class="card"><h3>有代購費</h3><div class="row"><span>成本</span><span class="money">${fmt(cost)}</span></div></div><div class="card"><h3>無代購費</h3><div class="row"><span>成本</span><span class="money">${fmt(base)}</span></div><div class="row"><span>代購費10%</span><span>${fmt(agent)}</span></div></div>`}

function renderUS(){document.getElementById('us').innerHTML=nav('🇺🇸 美國報價')+`<div class="panel"><span class="pill">算法A：商品×代購×匯率 + 磅×運費</span>${input('usAUsd','美金價格','$',10.99)}${input('usALb','重量','lb',1.37)}<span class="pill">算法B：(商品×代購 + 磅×運費)×匯率</span>${input('usBUsd','美金價格','$',10.99)}${input('usBLb','重量','lb',1.37)}<span class="pill">克磅換算</span>${input('usG','克轉磅','g',500)}${input('usLb','磅轉克','lb',1)}<button class="primary" onclick="calcAll()">開始計算</button></div><div id="usResults" class="result-grid"></div>`;calcAll()}
function calcUS(){let a=+document.getElementById('usAUsd')?.value||0,alb=+document.getElementById('usALb')?.value||0,b=+document.getElementById('usBUsd')?.value||0,blb=+document.getElementById('usBLb')?.value||0,g=+document.getElementById('usG')?.value||0,lb=+document.getElementById('usLb')?.value||0;let ares=a*st.usFeeA*st.usRate+alb*st.usShipA;let bres=(b*st.usFeeB+blb*st.usShipB)*st.usRate;document.getElementById('usResults').innerHTML=`<div class="card"><h3>算法A</h3><div class="row"><span>結果</span><span class="money">${fmt2(ares)}</span></div></div><div class="card"><h3>算法B</h3><div class="row"><span>結果</span><span class="money">${fmt2(bres)}</span></div></div><div class="card"><h3>重量換算</h3><div class="row"><span>${g} g =</span><span class="money">${(g*0.0022046).toFixed(4)} lb</span></div><div class="row"><span>${lb} lb =</span><span class="money">${(lb/0.0022046).toFixed(2)} g</span></div></div>`}
function renderHK(){document.getElementById('hk').innerHTML=nav('🇭🇰 香港報價')+`<div class="panel"><span class="pill">模式1：折扣＋買手費</span>${input('hkPrice','港幣價格','HK$',125)}${input('hkDiscount','折扣','×',1)}<span class="pill">模式2：重量運費</span>${input('hkWPrice','港幣價格','HK$',20)}${input('hkWeightFee','重量運費','NT$',85)}${input('hkWDiscount','折扣','×',1)}<button class="primary" onclick="calcAll()">開始計算</button></div><div id="hkResults" class="result-grid"></div>`;calcAll()}
function calcHK(){let p=+document.getElementById('hkPrice')?.value||0,d=+document.getElementById('hkDiscount')?.value||0,wp=+document.getElementById('hkWPrice')?.value||0,wf=+document.getElementById('hkWeightFee')?.value||0,wd=+document.getElementById('hkWDiscount')?.value||0;let c=p*d*st.hkRateCost+st.hkBuyerFee,wh=p*d*st.hkRateWholesale+st.hkBuyerFeeWholesale;let c2=wp*wd*st.hkShipRateCost+wf*st.hkShipPerG,wh2=wp*wd*st.hkShipRateWholesale+wf*st.hkShipPerG;document.getElementById('hkResults').innerHTML=`<div class="card"><h3>模式1：折扣＋買手費</h3><div class="row"><span>成本</span><span class="money">${fmt2(c)}</span></div><div class="row"><span>批價</span><span>${fmt2(wh)}</span></div></div><div class="card"><h3>模式2：重量運費</h3><div class="row"><span>成本</span><span class="money">${fmt2(c2)}</span></div><div class="row"><span>批價</span><span>${fmt2(wh2)}</span></div></div>`}
function renderAU(){document.getElementById('au').innerHTML=nav('🇦🇺 澳洲報價')+`<div class="panel">${input('auPrice','澳幣價格','A$',30)}${input('auWeight','重量','g',150)}<button class="primary" onclick="calcAll()">開始計算</button></div><div id="auResults" class="result-grid"></div>`;calcAll()}
function calcAU(){let p=+document.getElementById('auPrice')?.value||0,w=+document.getElementById('auWeight')?.value||0;let res=p*st.auRate+w*st.auShip;document.getElementById('auResults').innerHTML=`<div class="card"><h3>澳洲小計</h3><div class="row"><span>結果</span><span class="money">${fmt2(res)}</span></div></div>`}
function renderCZ(){document.getElementById('cz').innerHTML=nav('🇨🇿 捷克報價')+`<div class="panel">${input('czPrice','克朗價格','Kč',119.9)}${input('czWeight','重量','g',150)}<button class="primary" onclick="calcAll()">開始計算</button></div><div id="czResults" class="result-grid"></div>`;calcAll()}
function calcCZ(){let p=+document.getElementById('czPrice')?.value||0,w=+document.getElementById('czWeight')?.value||0;let res=p*st.czRate+w*st.czShip;document.getElementById('czResults').innerHTML=`<div class="card"><h3>捷克小計</h3><div class="row"><span>結果</span><span class="money">${fmt2(res)}</span></div></div>`}
function settingTitle(t){return `<div class="setting-title">${t}</div>`}
function settingInput(k,l,step='0.001'){return `<div class="setting-row"><label>${l}</label><input id="set_${k}" type="number" step="${step}" value="${st[k]}"></div>`}
function renderSettings(){let shipHtml=st.jpShips.map((v,i)=>`<div class="setting-row"><label>日本運費 ${i+1}</label><input id="jpShip${i}" type="number" step="0.01" value="${v}"></div>`).join('');document.getElementById('settings').innerHTML=nav('⚙️ 設定')+`<div class="panel"><div class="setting-hint">韓國運費為「每 g 運費」。例如 0.26 代表每公克 0.26 元；不需要運費就填 0。</div><div class="settings-table">${settingTitle('🇯🇵 日本')}${settingInput('jpRate','日幣匯率')}${shipHtml}${settingTitle('🇰🇷 韓國 QU')}${settingInput('krQuRate1','QU 匯率1')}${settingInput('krQuRate2','QU 匯率2')}${settingInput('krQuAir1','QU 空運運費1 / 每g')}${settingInput('krQuAir2','QU 空運運費2 / 每g')}${settingInput('krQuSea','QU 海運運費 / 每g')}${settingInput('krQuFee','QU 代購費倍率')}${settingTitle('🇰🇷 韓國 INN')}${settingInput('krHongRate1','INN 匯率1')}${settingInput('krHongRate2','INN 匯率2')}${settingInput('krHongAir','INN 空運運費 / 每g')}${settingInput('krHongSea','INN 海運運費 / 每g')}${settingTitle('🇹🇭 泰國')}${settingInput('thRate','泰銖匯率')}${settingInput('thShip','有代購運費 / 每g')}${settingInput('thWeightShip','無代購運費 / 每g')}${settingTitle('🇺🇸 美國')}${settingInput('usRate','美金匯率')}${settingInput('usFeeA','算法A代購費倍率')}${settingInput('usShipA','算法A運費')}${settingInput('usFeeB','算法B代購費倍率')}${settingInput('usShipB','算法B運費')}${settingTitle('🇭🇰 香港')}${settingInput('hkRateCost','港幣成本匯率')}${settingInput('hkRateWholesale','港幣批價匯率')}${settingInput('hkBuyerFee','買手費成本')}${settingInput('hkBuyerFeeWholesale','買手費批價')}${settingInput('hkShipRateCost','重量成本匯率')}${settingInput('hkShipRateWholesale','重量批價匯率')}${settingInput('hkShipPerG','香港重量運費 / 每g')}${settingTitle('🇦🇺 澳洲')}${settingInput('auRate','澳幣匯率')}${settingInput('auShip','澳洲運費 / 每g')}${settingTitle('🇨🇿 捷克')}${settingInput('czRate','捷克匯率')}${settingInput('czShip','捷克運費 / 每g')}</div><button class="primary" style="margin-top:16px" onclick="saveSettings()">儲存設定</button><p class="note">設定會存在這台手機/電腦的瀏覽器裡。換裝置要重新設定。</p></div>`}
function saveSettings(){Object.keys(defaults).forEach(k=>{if(k==='jpShips')return;let el=document.getElementById('set_'+k);if(el)st[k]=+el.value});st.jpShips=st.jpShips.map((_,i)=>+document.getElementById('jpShip'+i).value||0);save();alert('已儲存設定');renderAll();show('settings')}
function calcAll(){if(document.getElementById('jpResults'))calcJP();if(document.getElementById('krResults'))calcKR();if(document.getElementById('thResults'))calcTH();if(document.getElementById('usResults'))calcUS();if(document.getElementById('hkResults'))calcHK();if(document.getElementById('auResults'))calcAU();if(document.getElementById('czResults'))calcCZ()}
function renderAll(){renderJP();renderKR();renderTH();renderUS();renderHK();renderAU();renderCZ();renderSettings()}
renderAll();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
</script>

<script>
function updateNet(){const e=document.getElementById('netStatus');e.textContent=navigator.onLine?'🟢 Online':'🌹 Offline Ready';}
window.addEventListener('online',updateNet);window.addEventListener('offline',updateNet);
document.addEventListener('DOMContentLoaded',()=>{
updateNet();
document.querySelectorAll('input,select,textarea').forEach(el=>{
el.addEventListener('change',()=>{
try{localStorage.setItem('rose_autosave_'+(el.id||el.name||Math.random()),el.value);}catch(e){}
let t=document.getElementById('autosaveToast');
if(!t){t=document.createElement('div');t.id='autosaveToast';t.style='position:fixed;bottom:18px;right:18px;background:#2d7;color:#fff;padding:8px 12px;border-radius:8px;z-index:9999';document.body.appendChild(t);}
t.textContent='💾 已自動儲存 ✅';t.style.display='block';clearTimeout(window._ast);window._ast=setTimeout(()=>t.style.display='none',1200);
});
});
});
</script></body>
</html>
