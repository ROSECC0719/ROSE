<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f4728b" />
  <title>Abby代購神器</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{--pink:#f4728b;--pink2:#fff1f4;--ink:#3f2d34;--muted:#8c6b75;--card:#fff;--line:#f5c7d0;--cream:#fff8ef;--green:#ecfdf3;--blue:#eff6ff;--purple:#f7f0ff;}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#fff4f7,#fffaf3);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink)}
    .app{max-width:520px;margin:0 auto;min-height:100vh;padding:18px 16px 90px}.top{text-align:center;padding:12px 0 18px}.logo{font-size:34px}.title{font-weight:900;font-size:28px}.sub{color:var(--muted);font-size:13px;margin-top:4px}.grid{display:grid;gap:12px}.btn{width:100%;border:1px solid var(--line);background:#fff;border-radius:24px;padding:20px 22px;display:flex;align-items:center;justify-content:space-between;font-weight:850;font-size:22px;box-shadow:0 8px 24px #f6b8c533;cursor:pointer;color:var(--ink)}.btn small{font-size:13px;color:var(--muted);font-weight:650}.sep{height:1px;background:linear-gradient(90deg,transparent,#f5c7d0,transparent);margin:12px 0}.page{display:none}.page.active{display:block}.nav{display:flex;align-items:center;gap:12px;margin:8px 0 18px}.back{border:0;background:#fff;border-radius:50%;width:42px;height:42px;font-size:22px;box-shadow:0 8px 20px #e7b5be55;cursor:pointer}.h1{font-size:24px;font-weight:900}.panel{background:#fff;border:1px solid var(--line);border-radius:24px;padding:18px;margin-bottom:14px;box-shadow:0 8px 24px #f6b8c533}.field{margin:10px 0}.field label{display:block;font-weight:800;margin:0 0 7px;font-size:14px}.field .wrap{display:flex;align-items:center;background:#fff;border:2px solid #ffd1db;border-radius:18px;padding:0 14px}.field input{border:0;outline:0;padding:16px 4px;font-size:20px;flex:1;min-width:0;background:transparent}.unit{color:var(--muted);font-weight:800}.primary{border:0;background:var(--pink);color:white;font-size:20px;font-weight:900;border-radius:20px;width:100%;padding:17px;box-shadow:0 10px 20px #f4728b55;cursor:pointer}.settings-link{border:1px dashed var(--line);background:#fff;border-radius:18px;padding:12px;font-weight:800;color:#9b4054;cursor:pointer;width:100%;margin-top:10px}.result-grid{display:grid;gap:12px;margin-top:14px}.card{border-radius:22px;padding:16px;box-shadow:0 8px 24px #d9b8bf33}.card:nth-child(6n+1){background:#ffe6ee}.card:nth-child(6n+2){background:#fff0d8}.card:nth-child(6n+3){background:#eaf8f0}.card:nth-child(6n+4){background:#eaf2ff}.card:nth-child(6n+5){background:#f4eafe}.card:nth-child(6n+6){background:#fff6d9}.card h3{margin:0 0 12px;font-size:18px}.row{display:flex;justify-content:space-between;gap:12px;background:#ffffffcc;margin:8px 0;padding:11px 12px;border-radius:14px;font-weight:800}.row span:first-child{color:#7b5a63}.money{color:#e33f6a;font-size:19px}.kpi{display:grid;grid-template-columns:1fr 1fr;gap:10px}.kpi .row{display:block;text-align:center}.kpi b{display:block;font-size:24px;margin-top:4px;color:#e33f6a}.pill{display:inline-flex;padding:8px 12px;border-radius:999px;background:#fff;color:#9b4054;font-weight:800;font-size:13px;margin-bottom:12px}.settings-table{display:grid;gap:10px}.setting-row{display:grid;grid-template-columns:1fr 120px;gap:10px;align-items:center}.setting-row input{border:1px solid var(--line);border-radius:12px;padding:10px;font-size:16px}.note{font-size:13px;color:var(--muted);line-height:1.5}.bottom{position:fixed;left:0;right:0;bottom:0;background:#ffffffdd;backdrop-filter:blur(12px);border-top:1px solid #f3c7d0;padding:10px 12px}.tabs{max-width:520px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tab{border:0;background:#fff0f4;border-radius:16px;padding:10px 4px;font-weight:900;color:#9b4054;cursor:pointer}.tab.active{background:var(--pink);color:#fff}.hidden{display:none!important}
  </style>
</head>
<body>
<div class="app">
  <section id="home" class="page active">
    <div class="top"><div class="logo">🌸</div><div class="title">Abby代購神器</div><div class="sub">日本・韓國・泰國｜現場快速報價</div></div>
    <div class="grid">
      <button class="btn" onclick="show('jp')"><span>🇯🇵 日本</span><small>稅率 × 運費</small></button>
      <button class="btn" onclick="show('kr')"><span>🇰🇷 韓國</span><small>QU / 弘</small></button>
      <button class="btn" onclick="show('th')"><span>🇹🇭 泰國</span><small>一般 / 重量</small></button>
      <div class="sep"></div>
      <button class="btn" onclick="show('settings')"><span>⚙️ 設定</span><small>匯率與運費</small></button>
    </div>
  </section>
  <section id="jp" class="page"></section>
  <section id="kr" class="page"></section>
  <section id="th" class="page"></section>
  <section id="settings" class="page"></section>
</div>
<div class="bottom"><div class="tabs">
  <button class="tab active" onclick="show('home')">首頁</button><button class="tab" onclick="show('jp')">日本</button><button class="tab" onclick="show('kr')">韓國</button><button class="tab" onclick="show('th')">泰國</button>
</div></div>
<script>
const defaults={jpRate:.21,jpShips:[.20,.22,.24,.25,.27,.28],krQuFee:1.03,krQuRate1:39,krQuRate2:40,krQuAir1:.26,krQuAir2:.21,krQuSea:.16,krHongRate1:40,krHongRate2:42,krHongAir:.23,krHongSea:.146,thRate:1,thShip:.17,thWeightShip:.18};
let st=JSON.parse(localStorage.getItem('abbySettings')||'{}'); st={...defaults,...st};
const fmt=n=>'NT$ '+(isFinite(n)?Math.round(n).toLocaleString('zh-TW'):'0');
function save(){localStorage.setItem('abbySettings',JSON.stringify(st));}
function show(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); const map={home:0,jp:1,kr:2,th:3}; if(map[id]!=null)document.querySelectorAll('.tab')[map[id]].classList.add('active'); window.scrollTo(0,0)}
function nav(title){return `<div class="nav"><button class="back" onclick="show('home')">‹</button><div class="h1">${title}</div></div>`}
function input(id,label,unit,val=0){return `<div class="field"><label>${label}</label><div class="wrap"><input id="${id}" type="number" inputmode="decimal" value="${val}" oninput="calcAll()"><span class="unit">${unit}</span></div></div>`}
function jpCost(p,w,tax,ship){return p*tax*st.jpRate+w*ship}
function renderJP(){document.getElementById('jp').innerHTML=nav('🇯🇵 日本報價')+`<div class="panel">${input('jpPrice','商品價格（日幣）','¥',707)}${input('jpWeight','重量','g',48)}<button class="primary" onclick="calcAll()">開始計算</button><button class="settings-link" onclick="show('settings')">調整日本匯率 / 運費</button></div><div id="jpResults" class="result-grid"></div>`;calcAll()}
function calcJP(){let p=+document.getElementById('jpPrice')?.value||0,w=+document.getElementById('jpWeight')?.value||0;let html=`<div class="panel kpi"><div class="row">商品<b>¥ ${p.toLocaleString()}</b></div><div class="row">重量<b>${w} g</b></div></div>`;st.jpShips.forEach(ship=>{let a=jpCost(p,w,1.1,ship),b=jpCost(p,w,1.08,ship),c=jpCost(p,w,1,ship);html+=`<div class="card"><h3>運費 ${ship.toFixed(2)}</h3><div class="row"><span>10%稅 成本</span><span class="money">${fmt(a)}</span></div><div class="row"><span>8%稅 成本</span><span class="money">${fmt(b)}</span></div><div class="row"><span>未稅 成本</span><span class="money">${fmt(c)}</span></div><div class="row"><span>批價 +10%</span><span>${fmt(a*1.1)}</span></div><div class="row"><span>售價 +50%</span><span>${fmt(a*1.5)}</span></div></div>`});document.getElementById('jpResults').innerHTML=html}
function renderKR(){document.getElementById('kr').innerHTML=nav('🇰🇷 韓國報價')+`<div class="panel"><span class="pill">QU 模式</span>${input('krQuPrice','韓元價格','₩',28000)}${input('krQuWeight','重量','g',900)}<span class="pill">弘 模式</span>${input('krHongPrice','韓元價格','₩',10000)}${input('krHongWeight','重量','g',200)}<button class="primary" onclick="calcAll()">開始計算</button></div><div id="krResults" class="result-grid"></div>`;calcAll()}
function calcKR(){let p=+document.getElementById('krQuPrice')?.value||0,w=+document.getElementById('krQuWeight')?.value||0,hp=+document.getElementById('krHongPrice')?.value||0,hw=+document.getElementById('krHongWeight')?.value||0;let qAir1=p*st.krQuFee/st.krQuRate1+w*st.krQuAir1,qAir2=p*st.krQuFee/st.krQuRate2+w*st.krQuAir2,qSea1=p*st.krQuFee/st.krQuRate1+w*st.krQuSea,qSea2=p*st.krQuFee/st.krQuRate2+w*st.krQuSea;let hAir1=hp/st.krHongRate1+hw*st.krHongAir,hAir2=hp/st.krHongRate2+hw*st.krHongAir,hSea1=hp/st.krHongRate1+hw*st.krHongSea,hSea2=hp/st.krHongRate2+hw*st.krHongSea;document.getElementById('krResults').innerHTML=`<div class="card"><h3>QU 空運</h3><div class="row"><span>匯率 ${st.krQuRate1}</span><span class="money">${fmt(qAir1)}</span></div><div class="row"><span>匯率 ${st.krQuRate2}</span><span class="money">${fmt(qAir2)}</span></div></div><div class="card"><h3>QU 海運</h3><div class="row"><span>匯率 ${st.krQuRate1}</span><span class="money">${fmt(qSea1)}</span></div><div class="row"><span>匯率 ${st.krQuRate2}</span><span class="money">${fmt(qSea2)}</span></div></div><div class="card"><h3>弘 空運</h3><div class="row"><span>匯率 ${st.krHongRate1}</span><span class="money">${fmt(hAir1)}</span></div><div class="row"><span>匯率 ${st.krHongRate2}</span><span class="money">${fmt(hAir2)}</span></div></div><div class="card"><h3>弘 海運</h3><div class="row"><span>匯率 ${st.krHongRate1}</span><span class="money">${fmt(hSea1)}</span></div><div class="row"><span>匯率 ${st.krHongRate2}</span><span class="money">${fmt(hSea2)}</span></div></div>`}
function renderTH(){document.getElementById('th').innerHTML=nav('🇹🇭 泰國報價')+`<div class="panel"><span class="pill">一般模式</span>${input('thPrice','泰銖價格','฿',100)}${input('thWeight','重量','g',100)}<span class="pill">重量模式</span>${input('thWPrice','泰銖價格','฿',210)}${input('thWWeight','重量','g',400)}<button class="primary" onclick="calcAll()">開始計算</button></div><div id="thResults" class="result-grid"></div>`;calcAll()}
function calcTH(){let p=+document.getElementById('thPrice')?.value||0,w=+document.getElementById('thWeight')?.value||0,wp=+document.getElementById('thWPrice')?.value||0,ww=+document.getElementById('thWWeight')?.value||0;let cost=p*1.1*st.thRate+w*st.thShip;let base=wp*st.thRate+ww*st.thShip,agent=wp*1.1*st.thRate+ww*st.thWeightShip;document.getElementById('thResults').innerHTML=`<div class="card"><h3>一般模式</h3><div class="row"><span>成本</span><span class="money">${fmt(cost)}</span></div><div class="row"><span>批價 +10%</span><span>${fmt(cost*1.1)}</span></div><div class="row"><span>售價 +50%</span><span>${fmt(cost*1.5)}</span></div></div><div class="card"><h3>重量模式</h3><div class="row"><span>空運成本</span><span class="money">${fmt(base)}</span></div><div class="row"><span>代購費10%</span><span>${fmt(agent)}</span></div><div class="row"><span>批價 +20%</span><span>${fmt(base*1.2)}</span></div><div class="row"><span>售價 +50%</span><span>${fmt(base*1.5)}</span></div></div>`}
function renderSettings(){let fields=[['jpRate','日幣匯率'],['krQuRate1','韓國QU匯率1'],['krQuRate2','韓國QU匯率2'],['krHongRate1','韓國弘匯率1'],['krHongRate2','韓國弘匯率2'],['thRate','泰銖匯率'],['thShip','泰國一般運費/g'],['thWeightShip','泰國重量模式運費/g']]; let shipHtml=st.jpShips.map((v,i)=>`<div class="setting-row"><label>日本運費 ${i+1}</label><input id="jpShip${i}" type="number" step="0.01" value="${v}"></div>`).join('');document.getElementById('settings').innerHTML=nav('⚙️ 設定')+`<div class="panel"><div class="settings-table">${fields.map(([k,l])=>`<div class="setting-row"><label>${l}</label><input id="set_${k}" type="number" step="0.001" value="${st[k]}"></div>`).join('')}${shipHtml}</div><button class="primary" style="margin-top:16px" onclick="saveSettings()">儲存設定</button><p class="note">設定會存在這台手機/電腦的瀏覽器裡。換裝置要重新設定。</p></div>`}
function saveSettings(){['jpRate','krQuRate1','krQuRate2','krHongRate1','krHongRate2','thRate','thShip','thWeightShip'].forEach(k=>{st[k]=+document.getElementById('set_'+k).value||st[k]});st.jpShips=st.jpShips.map((_,i)=>+document.getElementById('jpShip'+i).value||0);save();alert('已儲存設定');renderJP();renderKR();renderTH();renderSettings();show('settings')}
function calcAll(){if(document.getElementById('jpResults'))calcJP();if(document.getElementById('krResults'))calcKR();if(document.getElementById('thResults'))calcTH()}
renderJP();renderKR();renderTH();renderSettings();
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
</script>
</body>
</html>
